<!DOCTYPE html>
  <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>
        {app_name} Verification
      </title>
      <style>
            @media only screen and (max-width: 620px) {{

            .container {{
                width: 100% !important;
            }}

            .content {{
                padding: 30px 20px !important;
            }}

            .code-box {{
                font-size: 26px !important;
                letter-spacing: 4px !important;
                padding: 15px 20px !important;
            }}

            h1 {{
                font-size: 22px !important;
            }}

            h2 {{
                font-size: 20px !important;
            }}

            p {{
                font-size: 15px !important;
            }}

            }}
        </style>
    </head>
    <body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">
      <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:30px 10px;">
        <tr>
          <td align="center">
            <table class="container" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
              <tr>
                <!-- <td align="center" style="background:#111827; padding:30px;"> -->
                {top_color}
                  <h1 style="color:#ffffff; margin:0; font-size:24px;">
                      <text x="180" y="190"
                            font-family="Arial, sans-serif"
                            font-size="80"
                            fill="black">
                            {app_name}
                      </text>
                  </h1>
                </td>
              </tr>
              <tr>
                <td class="content" style="padding:40px 35px; color:#333333;">
                  <h2 style="margin-top:0;">
                    {name} 👋
                  </h2>
                  <p style="font-size:16px; line-height:1.6;">
                    {this_msg_type}
                  </p>
                  <!-- BUTTON -->
                    <table width="100%" cellpadding="0" cellspacing="0" style="margin:30px 0;">
                      <tr>
                        <td align="center">
                          <table cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              {btn_color}
                                <a href="{verification_link}" target="_blank"
                                    class="button"
                                    style="
                                    display:inline-block;
                                    padding:16px 32px;
                                    font-size:16px;
                                    font-weight:bold;
                                    color:#ffffff;
                                    text-decoration:none;
                                    border-radius:6px;
                                    font-family:Arial, Helvetica, sans-serif;
                                    ">
                                  {btn_name}
                                </a>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                    <p style="font-size:15px; color:#555;">
                      {secret_code_msg}
                      <strong>
                        {token}
                      </strong>
                    </p>
                    <p style="font-size:15px; color:#555;">
                      {email_footer}
                    </p>
                    <!-- FALLBACK LINK -->
                      <p style="font-size:13px; color:#777; margin-top:25px;">
                        {button_fallback}
                        <br>
                        {link_color}
                          {verification_link}
                        </a>
                      </p>
                    </td>
                  </tr>
                  <tr>
                    <td style="background:#f9fafb; padding:25px; text-align:center; font-size:13px; color:#888;">
                      <p style="margin:0;">
                        © {year} {app_name}. All rights reserved.
                      </p>
                      <p style="margin:5px 0 0 0;">
                        {footer_note}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </body>
      </html>
